    <script type="module">
        import * as pdfjsLib from './lib/pdfjs/pdf.mjs';
        window.pdfjsLib = pdfjsLib;
        pdfjsLib.GlobalWorkerOptions.workerSrc = './lib/pdfjs/pdf.worker.mjs';
        pdfjsLib.GlobalWorkerOptions.standardFontDataUrl = './standard_fonts/';
        pdfjsLib.GlobalWorkerOptions.wasmUrl = './lib/pdfjs/';
        pdfjsLib.GlobalWorkerOptions.openjpegJsUrl = './lib/pdfjs/openjpeg_nowasm_fallback.js';
        pdfjsLib.GlobalWorkerOptions.cMapUrl = './cmaps/';
        pdfjsLib.GlobalWorkerOptions.cMapPacked = true;
    </script>
